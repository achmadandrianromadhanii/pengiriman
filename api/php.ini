; ============================================================================
; [VERCEL PHP CONFIGURATION]
; ============================================================================
; Fungsi: Mengatur konfigurasi PHP di lingkungan Vercel Serverless
; Cara Kerja: File ini otomatis dibaca oleh vercel-php runtime saat kompilasi.
;   Memastikan ekstensi PostgreSQL aktif dan PHP teroptimasi untuk produksi.
; Tata Letak: Harus berada di folder api/ berdampingan dengan index.php
; ============================================================================

; ── [EKSTENSI DATABASE] ──────────────────────────────────────────────────────
; Fungsi: Mengaktifkan driver PostgreSQL yang dibutuhkan untuk koneksi ke Neon
extension=pdo_pgsql
extension=pgsql

; ── [EKSTENSI GRAFIS] ────────────────────────────────────────────────────────
; Fungsi: Mengaktifkan library GD untuk pemrosesan gambar (QR code, barcode)
extension=gd

; ── [OPTIMASI PRODUKSI] ──────────────────────────────────────────────────────
; Fungsi: Mengoptimasi PHP untuk performa terbaik di lingkungan serverless
expose_php = Off
memory_limit = 256M
max_execution_time = 30
display_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
